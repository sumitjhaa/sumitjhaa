name: Update README

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install requests

      - name: Generate language grid
        run: python scripts/generate_lang_grid.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate weekly activity
        run: python scripts/generate_weekly.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate README with updated stats
        run: python scripts/generate_readme.py

      - name: Update uptime
        run: python scripts/update_uptime.py

      - name: Update GitHub stats
        run: python scripts/update_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update lines of code
        run: python scripts/update_loc.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md img/
          git diff --staged --quiet || git commit -m "chore: update profile $(date -u +%Y-%m-%d)"
          git push
